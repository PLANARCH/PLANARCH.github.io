<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자료 아카이브</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js/styles/github-dark.min.css">
    
    <style>
        :root { 
            --primary: #3b82f6; 
            --sidebar-width: 280px;
            --toc-width: 260px;
        }

        body.dark { --bg:#0f172a; --card:#1e293b; --text:#f8fafc; --dim:#94a3b8; --border: #334155; }
        body.light { --bg:#f8fafc; --card:#fff; --text:#0f172a; --dim:#64748b; --border: #e2e8f0; }

        body { margin:0; font-family: system-ui, -apple-system, sans-serif; background:var(--bg); color:var(--text); transition: background 0.3s; overflow-x: hidden; touch-action: pan-y; }

        header {
            display:flex; justify-content:space-between; align-items: center;
            padding:10px 20px; border-bottom:1px solid var(--border);
            position: sticky; top: 0; background: var(--bg); z-index: 1100;
        }

        /* 🔥 공통 패널 스타일 (사이드바 & 목차) */
        .panel {
            background: var(--bg);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: fixed; top: 60px; bottom: 0; z-index: 1050;
            overflow-y: auto; box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
        #sidebar { width: var(--sidebar-width); left: 0; transform: translateX(-100%); border-right: 1px solid var(--border); padding: 1rem; }
        #toc { width: var(--toc-width); right: 0; transform: translateX(100%); border-left: 1px solid var(--border); padding: 1rem; }
        
        #sidebar.active, #toc.active { transform: translateX(0); }

        /* 🔥 오버레이 (메인 클릭 닫기용) */
        .overlay {
            position: fixed; top: 60px; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4); z-index: 1000;
            display: none; backdrop-filter: blur(2px);
        }
        body.panel-open .overlay { display: block; }

        .cat-group { margin-bottom: 1.2rem; }
        .cat-title { cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; padding: 10px; border-radius: 8px; background: rgba(128,128,128,0.1); }
        .cat-items { overflow: hidden; transition: max-height 0.3s ease; }
        .cat-items.collapsed { max-height: 0; }
        .sidebar-item { padding: 8px 12px; cursor: pointer; font-size: 0.9rem; color: var(--dim); border-radius: 6px; margin-top: 2px; }
        .sidebar-item:hover { color: var(--primary); background: rgba(59, 130, 246, 0.1); }

        .content { padding: 2rem; max-width: 900px; margin: 0 auto; min-height: 100vh; }
        #search { width: 100%; padding: 14px; margin-bottom: 25px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text); outline:none; }

        .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.2rem; }
        .card { padding: 24px; background: var(--card); border-radius: 14px; cursor: pointer; border: 1px solid var(--border); transition: 0.2s; }
        .card:hover { border-color: var(--primary); transform: translateY(-3px); }

        #viewer { display: none; }
        .markdown-body { padding: 20px; background: transparent !important; color: inherit !important; }
        
        .btn-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; font-size: 0.9rem; }
        .btn-primary { background: var(--primary); color: white; border: none; }
    </style>
</head>

<body class="dark">

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div onclick="toggleSidebar(event)" style="cursor:pointer; font-size: 1.5rem;">☰</div>
        <h1 style="margin:0; font-size: 1.1rem;">📚 자료 아카이브</h1>
    </div>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div id="toc-toggle-btn" onclick="toggleTOC(event)" style="cursor:pointer; display:none; color:var(--primary); font-weight:bold;">목차</div>
        <div onclick="toggleTheme()" style="cursor:pointer; font-size: 1.2rem;">🌓</div>
    </div>
</header>

<main class="layout">
    <div class="overlay" id="main-overlay" onclick="closeAllPanels()"></div>

    <aside id="sidebar" class="panel"></aside>

    <section class="content" id="main-content">
        <div id="main-ui">
            <input id="search" placeholder="제목이나 태그로 검색..." />
            <div id="content-grid" class="cards"></div>
        </div>

        <div id="viewer">
            <div class="btn-row">
                <button class="btn" onclick="closeMarkdown()">← 목록</button>
                <button class="btn btn-primary" onclick="copyLink()">🔗 링크 복사</button>
            </div>
            <article id="md-content" class="markdown-body"></article>
        </div>
    </section>

    <aside id="toc" class="panel"></aside>
</main>

<script src="https://cdn.jsdelivr.net/npm/highlight.js/lib/common.min.js"></script>

<script>
    /* 🛠 [핵심] 강화된 마크다운 파서 - 외부 라이브러리 없이도 # 인식 */
    function robustMarked(md) {
        if (!md) return "";
        let lines = md.split('\n');
        let html = "";
        let inList = false;
        let inCodeBlock = false;

        lines.forEach(line => {
            // 코드 블록 처리
            if (line.trim().startsWith('```')) {
                inCodeBlock = !inCodeBlock;
                html += inCodeBlock ? '<pre><code class="hljs">' : '</code></pre>';
                return;
            }
            if (inCodeBlock) {
                html += line + '\n';
                return;
            }

            // 헤더 처리 (확실하게 인식하도록 정규식 보강)
            if (line.startsWith('### ')) { html += `<h3>${line.substring(4)}</h3>`; return; }
            if (line.startsWith('## ')) { html += `<h2>${line.substring(3)}</h2>`; return; }
            if (line.startsWith('# ')) { html += `<h1>${line.substring(2)}</h1>`; return; }

            // 리스트 처리
            if (line.trim().startsWith('- ') || line.trim().startsWith('* ')) {
                if (!inList) { html += '<ul>'; inList = true; }
                html += `<li>${line.trim().substring(2)}</li>`;
                return;
            } else if (inList) {
                html += '</ul>';
                inList = false;
            }

            // 일반 텍스트 및 인라인 요소
            let processedLine = line
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/`(.*?)`/g, '<code>$1</code>');

            if (processedLine.trim() === "") {
                html += '<br>';
            } else {
                html += `<p>${processedLine}</p>`;
            }
        });
        return html;
    }

    const sidebar = document.getElementById('sidebar');
    const toc = document.getElementById('toc');
    const grid = document.getElementById('content-grid');
    const mainUi = document.getElementById('main-ui');
    const viewer = document.getElementById('viewer');
    const mdContent = document.getElementById('md-content');
    const tocToggleBtn = document.getElementById('toc-toggle-btn');

    let allData = [];

    fetch('data.json').then(r => r.json()).then(data => {
        allData = data;
        renderSidebar(data);
        renderGrid(data);
        // 초기 접속 시 파일 파라미터 확인
        const p = new URLSearchParams(window.location.search).get('file');
        if(p) openMarkdown(p);
    });

    // 📱 패널 제어
    function toggleSidebar(e) { if(e) e.stopPropagation(); sidebar.classList.toggle('active'); updateOverlay(); }
    function toggleTOC(e) { if(e) e.stopPropagation(); toc.classList.toggle('active'); updateOverlay(); }
    
    function closeAllPanels() {
        sidebar.classList.remove('active');
        toc.classList.remove('active');
        updateOverlay();
    }

    function updateOverlay() {
        const isOpen = sidebar.classList.contains('active') || toc.classList.contains('active');
        document.body.classList.toggle('panel-open', isOpen);
    }

    // 📱 스와이프 (사이드바 & 목차 통합)
    let startX = 0;
    window.addEventListener('touchstart', e => startX = e.changedTouches[0].screenX, {passive: true});
    window.addEventListener('touchend', e => {
        const endX = e.changedTouches[0].screenX;
        const diff = endX - startX;
        const width = window.innerWidth;

        if (Math.abs(diff) < 80) return; // 짧은 움직임 무시

        if (diff > 0) { // 오른쪽으로 밀기
            if (startX < width * 0.2) { if(!sidebar.classList.contains('active')) toggleSidebar(); } // 사이드바 열기
            if (toc.classList.contains('active')) toggleTOC(); // 목차 닫기
        } else { // 왼쪽으로 밀기
            if (startX > width * 0.8) { if(!toc.classList.contains('active')) toggleTOC(); } // 목차 열기
            if (sidebar.classList.contains('active')) toggleSidebar(); // 사이드바 닫기
        }
    }, {passive: true});

    // 📄 마크다운 열기
    function openMarkdown(path) {
        fetch(path).then(r => r.text()).then(md => {
            mainUi.style.display = 'none';
            viewer.style.display = 'block';
            tocToggleBtn.style.display = 'block';
            
            // 파서 호출
            mdContent.innerHTML = robustMarked(md);
            
            // 코드 하이라이트
            document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
            
            generateTOC();
            closeAllPanels();
            history.pushState(null, "", `?file=${path}`);
            window.scrollTo(0,0);
        });
    }

    function closeMarkdown() {
        mainUi.style.display = 'block';
        viewer.style.display = 'none';
        tocToggleBtn.style.display = 'none';
        closeAllPanels();
        history.pushState(null, "", window.location.pathname);
    }

    function generateTOC() {
        toc.innerHTML = "<h3>목차</h3><hr>";
        mdContent.querySelectorAll('h1, h2, h3').forEach((h, idx) => {
            h.id = "h-" + idx;
            const item = document.createElement('div');
            item.className = 'sidebar-item';
            item.textContent = h.textContent;
            item.onclick = () => { h.scrollIntoView({behavior:'smooth'}); closeAllPanels(); };
            toc.appendChild(item);
        });
    }

    function renderSidebar(data) {
        const grouped = data.reduce((acc, obj) => {
            acc[obj.category] = acc[obj.category] || [];
            acc[obj.category].push(obj);
            return acc;
        }, {});

        sidebar.innerHTML = '<h3>카테고리</h3>';
        Object.keys(grouped).forEach(cat => {
            const div = document.createElement('div');
            div.className = 'cat-group';
            div.innerHTML = `<div class="cat-title" onclick="this.nextSibling.classList.toggle('collapsed')">${cat} ▾</div>`;
            const items = document.createElement('div');
            items.className = 'cat-items';
            grouped[cat].forEach(i => {
                const item = document.createElement('div');
                item.className = 'sidebar-item';
                item.textContent = i.title;
                item.onclick = () => openMarkdown(i.path);
                items.appendChild(item);
            });
            div.appendChild(items);
            sidebar.appendChild(div);
        });
    }

    function renderGrid(data) {
        grid.innerHTML = '';
        data.forEach(i => {
            const c = document.createElement('div');
            c.className = 'card';
            c.innerHTML = `<strong>${i.title}</strong><div style="font-size:0.8rem; color:var(--dim); margin-top:8px;">${i.category}</div>`;
            c.onclick = () => openMarkdown(i.path);
            grid.appendChild(c);
        });
    }

    function copyLink() {
        const url = window.location.href;
        navigator.clipboard.writeText(url).then(() => {
            alert("공유 링크가 복사되었습니다!");
        });
    }

    function toggleTheme() { document.body.classList.toggle('dark'); document.body.classList.toggle('light'); }

    document.getElementById('search').oninput = (e) => {
        const k = e.target.value.toLowerCase();
        renderGrid(allData.filter(i => i.title.toLowerCase().includes(k) || i.category.toLowerCase().includes(k)));
    };
</script>

</body>
</html>
