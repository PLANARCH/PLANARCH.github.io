<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>자료 아카이브</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js/lib/common.min.js"></script>

<style>
:root { --primary:#3b82f6; }

body.dark { --bg:#0f172a; --card:#1e293b; --text:#f8fafc; --dim:#94a3b8;}
body.light { --bg:#f8fafc; --card:#fff; --text:#0f172a; --dim:#64748b;}

body { margin:0; font-family:system-ui; background:var(--bg); color:var(--text); }

header {
  display:flex; justify-content:space-between;
  padding:10px 20px; border-bottom:1px solid var(--dim);
}

.layout { display:grid; grid-template-columns:auto 1fr auto; }

#sidebar { padding:1rem; border-right:1px solid var(--dim); }
#sidebar div { cursor:pointer; font-size:0.85rem; color:var(--dim); }

#toc { padding:1rem; border-left:1px solid var(--dim); }

.content { padding:1rem; }

#search {
  width:100%; padding:8px;
  border-radius:8px; border:none;
  background:var(--card); color:var(--text);
}

.cards {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:0.8rem;
}

.card {
  height:100px;
  display:flex;
  justify-content:center;
  align-items:center;
  background:var(--card);
  border-radius:10px;
  cursor:pointer;
}

#editor {
  display:none;
  padding:1rem;
  background:var(--card);
  border-radius:10px;
  margin-bottom:1rem;
}

textarea { width:100%; height:200px; }
</style>
</head>

<body class="dark">

<header>
  <h1>📚 자료 아카이브</h1>
  <div>
    <button onclick="openEditor()">✏️</button>
    <button onclick="toggleTheme()">🌙</button>
  </div>
</header>

<main class="layout">
  <aside id="sidebar"></aside>

  <section class="content">

    <input id="search" placeholder="검색..." />

    <!-- ✏️ EDITOR -->
    <div id="editor">
      <input id="edit-title" placeholder="파일명 (react.md)" />
      <input id="edit-category" placeholder="카테고리 (frontend)" />

      <div id="dropzone" style="border:1px dashed var(--dim); padding:10px; margin:10px 0;">
        이미지 드롭
      </div>

      <textarea id="edit-content"></textarea>

      <button onclick="savePost()">💾 저장</button>
      <button onclick="deletePost()">🗑️ 삭제</button>
    </div>

    <div id="content-grid"></div>
    <div id="viewer"></div>
  </section>

  <aside id="toc"></aside>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
marked.setOptions({ breaks:true });

const owner="PLANARCH";
const repo="PLANARCH.github.io";

const grid = document.getElementById('content-grid');
const viewer = document.getElementById('viewer');
const sidebar = document.getElementById('sidebar');
const toc = document.getElementById('toc');
const searchInput = document.getElementById('search');

let allData = [];
let currentEditPath = null;

// 🔐 토큰
function getToken() {
  let token = localStorage.getItem("github_token");
  if (!token) {
    token = prompt("GitHub Token 입력");
    localStorage.setItem("github_token", token);
  }
  return token;
}

// LOAD
fetch('data.json')
.then(r=>r.json())
.then(data=>{
  allData = data;
  renderSidebar(data);
  render(data);
});

// SIDEBAR
function renderSidebar(data){
  sidebar.innerHTML='';
  const g = group(data);

  Object.keys(g).forEach(cat=>{
    const h=document.createElement('h3');
    h.textContent=cat;
    sidebar.appendChild(h);

    g[cat].forEach(i=>{
      const el=document.createElement('div');
      el.textContent=i.title;
      el.onclick=()=>openMarkdown(i.path);
      sidebar.appendChild(el);
    });
  });
}

// MAIN
function render(data){
  grid.innerHTML='';
  viewer.style.display='none';

  const g = group(data);

  Object.keys(g).forEach(cat=>{
    const section=document.createElement('div');
    section.innerHTML=`<h2>${cat}</h2>`;

    const cards=document.createElement('div');
    cards.className='cards';

    g[cat].forEach(i=>{
      const card=document.createElement('div');
      card.className='card';
      card.textContent=i.title;

      card.onclick=()=>openMarkdown(i.path);
      card.ondblclick=()=>openEditor(i);

      cards.appendChild(card);
    });

    section.appendChild(cards);
    grid.appendChild(section);
  });
}

// MARKDOWN
function openMarkdown(path){
  fetch(path)
  .then(r=>r.text())
  .then(md=>{
    viewer.innerHTML = `<div class="markdown-body">${marked.parse(md)}</div>`;
    grid.style.display='none';
    viewer.style.display='block';
  });
}

// EDITOR
function openEditor(item=null){
  document.getElementById("editor").style.display="block";

  if(item){
    fetch(item.path)
    .then(r=>r.text())
    .then(md=>{
      document.getElementById("edit-title").value=item.title+".md";
      document.getElementById("edit-category").value=item.category;
      document.getElementById("edit-content").value=md;
      currentEditPath=item.path;
    });
  } else {
    currentEditPath=null;
  }
}

// SAVE
async function savePost(){
  const token=getToken();

  const title=document.getElementById("edit-title").value;
  const category=document.getElementById("edit-category").value;
  const content=document.getElementById("edit-content").value;

  const path=currentEditPath || `docs/${category}/${title}`;

  let sha=null;

  if(currentEditPath){
    const res=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`);
    const data=await res.json();
    sha=data.sha;
  }

  await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`,{
    method:"PUT",
    headers:{
      "Authorization":`token ${token}`,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      message:"update",
      content:btoa(unescape(encodeURIComponent(content))),
      ...(sha && { sha })
    })
  });

  await updateDataJson(token);
  location.reload();
}

// DELETE
async function deletePost(){
  if(!currentEditPath) return alert("삭제할 파일 없음");

  const token=getToken();

  const res=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${currentEditPath}`);
  const data=await res.json();

  await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${currentEditPath}`,{
    method:"DELETE",
    headers:{
      "Authorization":`token ${token}`,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      message:"delete",
      sha:data.sha
    })
  });

  await updateDataJson(token);
  location.reload();
}

// 🔥 data.json 자동 생성
async function updateDataJson(token){
  const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/docs`);
  const folders = await res.json();

  let result=[];

  for(const folder of folders){
    if(folder.type==="dir"){
      const filesRes = await fetch(folder.url);
      const files = await filesRes.json();

      files.forEach(f=>{
        if(f.name.endsWith(".md")){
          result.push({
            title: f.name.replace(".md",""),
            category: folder.name,
            path: `docs/${folder.name}/${f.name}`
          });
        }
      });
    }
  }

  const content = btoa(unescape(encodeURIComponent(JSON.stringify(result,null,2))));

  // 기존 sha
  let sha=null;
  try{
    const old = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/docs/data.json`);
    const j = await old.json();
    sha=j.sha;
  }catch{}

  await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/docs/data.json`,{
    method:"PUT",
    headers:{
      "Authorization":`token ${token}`,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      message:"update data.json",
      content,
      ...(sha && { sha })
    })
  });
}

// GROUP
function group(data){
  const g={};
  data.forEach(i=>{
    if(!g[i.category]) g[i.category]=[];
    g[i.category].push(i);
  });
  return g;
}

// THEME
function toggleTheme(){
  document.body.classList.toggle('dark');
  document.body.classList.toggle('light');
}
</script>

</body>
</html>
