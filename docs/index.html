<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자료 아카이브</title>
    <!-- Marked.js 라이브러리 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">
    <div id="overlay" class="overlay"></div>
    
    <!-- 사이드바 -->
    <aside id="sidebar" class="sidebar">
        <header>
            <h3>Archive Tree</h3>
            <button id="close-sidebar-btn" class="icon-btn">✕</button>
        </header>
        <nav id="tree-container"></nav>
    </aside>

    <!-- 메인 콘텐츠 -->
    <main id="main-content">
        <div id="content-grid" class="grid-view"></div>
        
        <!-- 마크다운 뷰어 (오버레이) -->
        <div id="viewer-overlay" class="viewer-overlay hidden">
            <button id="close-viewer-btn" class="icon-btn viewer-close">✕</button>
            <h2 id="viewer-title"></h2>
            <div id="md-content" class="markdown-body"></div>
        </div>

        <!-- 검색 바 -->
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="검색...">
        </div>
    </main>

    <!-- 스크립트 로드 -->
    <script src="script.js"></script>
</body>
</html>
