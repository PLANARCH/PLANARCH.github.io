<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자료 아카이브</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js/styles/github-dark.min.css">
    
    <style>
        :root { 
            --primary: #3b82f6; 
            --sidebar-width: 280px;
            --toc-width: 260px;
        }

        body.dark { --bg:#0f172a; --card:#1e293b; --text:#f8fafc; --dim:#94a3b8; --border: #334155; }
        body.light { --bg:#f8fafc; --card:#fff; --text:#0f172a; --dim:#64748b; --border: #e2e8f0; }

        body { margin:0; font-family: system-ui, sans-serif; background:var(--bg); color:var(--text); transition: background 0.3s; overflow-x: hidden; touch-action: pan-y; }

        header {
            display:flex; justify-content:space-between; align-items: center;
            padding:10px 20px; border-bottom:1px solid var(--border);
            position: sticky; top: 0; background: var(--bg); z-index: 1100;
        }

        /* 🔥 공통 패널 스타일 */
        .panel {
            background: var(--bg);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: fixed; top: 60px; bottom: 0; z-index: 1050;
            overflow-y: auto; box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }
        /* 사이드바 (왼쪽) */
        #sidebar { width: var(--sidebar-width); left: 0; transform: translateX(-100%); border-right: 1px solid var(--border); padding: 1rem; }
        /* 목차 (오른쪽) */
        #toc { width: var(--toc-width); right: 0; transform: translateX(100%); border-left: 1px solid var(--border); padding: 1rem; }
        
        #sidebar.active, #toc.active { transform: translateX(0); }

        /* 🔥 오버레이 (메인 클릭 닫기용) */
        .overlay {
            position: fixed; top: 60px; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4); z-index: 1000;
            display: none; backdrop-filter: blur(2px);
        }
        body.panel-open .overlay { display: block; }

        .cat-group { margin-bottom: 1rem; }
        .cat-title { cursor: pointer; font-weight: bold; padding: 10px; border-radius: 8px; background: rgba(128,128,128,0.1); margin-bottom: 5px; }
        .cat-items { overflow: hidden; transition: max-height 0.3s ease; }
        .cat-items.collapsed { max-height: 0; }
        .sidebar-item { padding: 8px 12px; cursor: pointer; font-size: 0.9rem; color: var(--dim); border-radius: 6px; }
        .sidebar-item:hover { color: var(--primary); background: rgba(59, 130, 246, 0.1); }

        .content { padding: 2rem; max-width: 900px; margin: 0 auto; min-height: 100vh; }
        #search { width: 100%; padding: 14px; margin-bottom: 25px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text); outline: none; }

        .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.2rem; }
        .card { padding: 24px; background: var(--card); border-radius: 14px; cursor: pointer; border: 1px solid var(--border); transition: 0.2s; }
        .card:hover { border-color: var(--primary); transform: translateY(-3px); }

        #viewer { display: none; }
        .markdown-body { padding: 20px; background: transparent !important; color: inherit !important; min-height: 400px; }
        
        .btn-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; }
    </style>
</head>

<body class="dark">

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div onclick="toggleSidebar(event)" style="cursor:pointer; font-size: 1.5rem;">☰</div>
        <h1 style="margin:0; font-size: 1.1rem;">📚 자료 아카이브</h1>
    </div>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div id="toc-toggle-btn" onclick="toggleTOC(event)" style="cursor:pointer; display:none; color:var(--primary); font-weight:bold;">목차</div>
        <div onclick="toggleTheme()" style="cursor:pointer; font-size: 1.2rem;">🌓</div>
    </div>
</header>

<main class="layout">
    <div class="overlay" onclick="closeAllPanels()"></div>

    <aside id="sidebar" class="panel"></aside>

    <section class="content">
        <div id="main-ui">
            <input id="search" placeholder="자료 검색..." />
            <div id="content-grid" class="cards"></div>
        </div>

        <div id="viewer">
            <div class="btn-row">
                <button class="btn" onclick="closeMarkdown()">← 목록</button>
                <button class="btn" onclick="copyLink()" style="background:var(--primary); color:white; border:none;">🔗 링크 복사</button>
            </div>
            <article id="md-content" class="markdown-body"></article>
        </div>
    </section>

    <aside id="toc" class="panel"></aside>
</main>

<script src="https://unpkg.com/marked@12.0.2/marked.min.js"></script>
<script>
    console.log("marked:", window.marked);
</script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js/lib/common.min.js"></script>

<script>
    /* 🛠 마크다운 렌더러 (라이브러리 미작동 시 대비한 자체 파서 포함) */
    function renderMarkdown(md) {
        if (!md) return "";
        try {
            // 라이브러리가 로드되었다면 사용
            if (typeof marked !== 'undefined') {
                return marked.parse(md);
            }
        } catch (e) { console.error("Marked error:", e); }

        // 자체 파서 (최소한의 제목, 리스트, 볼드라도 표시하도록 함)
        return md.replace(/^# (.*$)/gim, '<h1>$1</h1>')
                 .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                 .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                 .replace(/^\- (.*$)/gim, '<li>$1</li>')
                 .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                 .replace(/\n/g, '<br>');
    }

    const sidebar = document.getElementById('sidebar');
    const toc = document.getElementById('toc');
    const mdContent = document.getElementById('md-content');
    const tocBtn = document.getElementById('toc-toggle-btn');
    let allData = [];

    // 데이터 불러오기
    fetch('data.json').then(r => r.json()).then(data => {
        allData = data;
        renderSidebar(data);
        renderGrid(data);
        const file = new URLSearchParams(window.location.search).get('file');
        if(file) openMarkdown(file);
    });

    /* 📱 패널 제어 (상호 배타적) */
    function toggleSidebar(e) {
        if(e) e.stopPropagation();
        toc.classList.remove('active'); // 목차 닫기
        sidebar.classList.toggle('active');
        updateOverlay();
    }

    function toggleTOC(e) {
        if(e) e.stopPropagation();
        sidebar.classList.remove('active'); // 사이드바 닫기
        toc.classList.toggle('active');
        updateOverlay();
    }

    function closeAllPanels() {
        sidebar.classList.remove('active');
        toc.classList.remove('active');
        updateOverlay();
    }

    function updateOverlay() {
        document.body.classList.toggle('panel-open', sidebar.classList.contains('active') || toc.classList.contains('active'));
    }

    /* 📱 스와이프 로직 (요청하신 방향 반영) */
    let startX = 0;
    window.addEventListener('touchstart', e => startX = e.changedTouches[0].screenX, {passive: true});
    window.addEventListener('touchend', e => {
        const endX = e.changedTouches[0].screenX;
        const diff = endX - startX;
        const width = window.innerWidth;

        if (Math.abs(diff) < 70) return; // 미세한 움직임 무시

        if (diff > 70) { 
            // ➡️ 오른쪽으로 스와이프
            if (startX < width * 0.3) toggleSidebar(null); // 왼쪽 끝에서 밀면 사이드바 열기
            if (toc.classList.contains('active')) closeAllPanels(); // 목차 열려있으면 닫기
        } else if (diff < -70) { 
            // ⬅️ 왼쪽으로 스와이프
            if (startX > width * 0.7) toggleTOC(null); // 오른쪽 끝에서 밀면 목차 열기
            if (sidebar.classList.contains('active')) closeAllPanels(); // 사이드바 열려있으면 닫기
        }
    }, {passive: true});

    /* 📄 자료 열기 */
    function openMarkdown(path) {
        fetch(path).then(r => {
            if(!r.ok) throw new Error();
            return r.text();
        }).then(md => {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('viewer').style.display = 'block';
            tocBtn.style.display = 'block';
            
            mdContent.innerHTML = renderMarkdown(md);
            document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
            
            generateTOC();
            closeAllPanels();
            history.pushState(null, "", `?file=${path}`);
            window.scrollTo(0,0);
        }).catch(() => {
            alert("파일을 찾을 수 없습니다: " + path);
        });
    }

    function closeMarkdown() {
        document.getElementById('main-ui').style.display = 'block';
        document.getElementById('viewer').style.display = 'none';
        tocBtn.style.display = 'none';
        closeAllPanels();
        history.pushState(null, "", window.location.pathname);
    }

    function generateTOC() {
        toc.innerHTML = "<h3>목차</h3><hr>";
        mdContent.querySelectorAll('h1, h2, h3').forEach((h, i) => {
            h.id = "h-" + i;
            const item = document.createElement('div');
            item.className = 'sidebar-item';
            item.textContent = h.textContent;
            item.onclick = () => { h.scrollIntoView({behavior:'smooth'}); closeAllPanels(); };
            toc.appendChild(item);
        });
    }

    function renderSidebar(data) {
        const grouped = data.reduce((acc, obj) => {
            acc[obj.category] = acc[obj.category] || [];
            acc[obj.category].push(obj);
            return acc;
        }, {});
        sidebar.innerHTML = "<h3>카테고리</h3>";
        Object.keys(grouped).forEach(cat => {
            const group = document.createElement('div');
            group.className = 'cat-group';
            group.innerHTML = `<div class="cat-title" onclick="this.nextSibling.classList.toggle('collapsed')">${cat} ▾</div>`;
            const items = document.createElement('div');
            items.className = 'cat-items';
            grouped[cat].forEach(i => {
                const item = document.createElement('div');
                item.className = 'sidebar-item';
                item.textContent = i.title;
                item.onclick = () => openMarkdown(i.path);
                items.appendChild(item);
            });
            group.appendChild(items);
            sidebar.appendChild(group);
        });
    }

    function renderGrid(data) {
        const grid = document.getElementById('content-grid');
        grid.innerHTML = '';
        data.forEach(i => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<strong>${i.title}</strong><div style="font-size:0.8rem; color:var(--dim); margin-top:8px;">${i.category}</div>`;
            card.onclick = () => openMarkdown(i.path);
            grid.appendChild(card);
        });
    }

    function copyLink() {
        navigator.clipboard.writeText(window.location.href).then(() => alert("링크가 복사되었습니다!"));
    }

    function toggleTheme() {
        document.body.classList.toggle('dark');
        document.body.classList.toggle('light');
    }

    document.getElementById('search').oninput = (e) => {
        const k = e.target.value.toLowerCase();
        renderGrid(allData.filter(i => i.title.toLowerCase().includes(k) || i.category.toLowerCase().includes(k)));
    };
</script>

</body>
</html>
