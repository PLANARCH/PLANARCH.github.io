<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자료 아카이브</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js/styles/github-dark.min.css">
    
    <style>
        :root { 
            --primary: #3b82f6; 
            --sidebar-width: 280px;
            --toc-width: 260px;
        }

        body.dark { --bg:#0f172a; --card:#1e293b; --text:#f8fafc; --dim:#94a3b8; --border: #334155; }
        body.light { --bg:#f8fafc; --card:#fff; --text:#0f172a; --dim:#64748b; --border: #e2e8f0; }

        body { margin:0; font-family: system-ui, sans-serif; background:var(--bg); color:var(--text); transition: background 0.3s; overflow-x: hidden; }

        header {
            display:flex; justify-content:space-between; align-items: center;
            padding:10px 20px; border-bottom:1px solid var(--border);
            position: sticky; top: 0; background: var(--bg); z-index: 1100;
        }

        /* 📁 패널 스타일 */
        .panel {
            background: var(--bg);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: fixed; top: 0; bottom: 0; z-index: 1500;
            overflow-y: auto; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #sidebar { width: var(--sidebar-width); left: 0; transform: translateX(-100%); border-right: 1px solid var(--border); padding: 1rem; }
        #toc { width: var(--toc-width); right: 0; transform: translateX(100%); border-left: 1px solid var(--border); padding: 1rem; }
        
        #sidebar.active, #toc.active { transform: translateX(0); }

        /* 🌑 오버레이 */
        .overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6); z-index: 1400;
            display: none; backdrop-filter: blur(4px);
        }
        body.panel-open .overlay { display: block; }

        /* 📂 그리드 & 카드 */
        .content { padding: 2rem; max-width: 1000px; margin: 0 auto; min-height: 100vh; }
        .breadcrumb { margin-bottom: 20px; font-size: 0.9rem; color: var(--primary); cursor: pointer; }
        
        .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.2rem; }
        .card { 
            padding: 30px 20px; background: var(--card); border-radius: 14px; 
            cursor: pointer; border: 1px solid var(--border); transition: 0.2s;
            display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px;
        }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .card i { font-size: 2rem; color: var(--primary); }

        /* 📄 팝업 뷰어 (z-index 최상위) */
        #viewer { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg); z-index: 2000; display: none; overflow-y: auto;
        }
        .viewer-header {
            position: sticky; top: 0; background: var(--bg); padding: 15px 25px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); z-index: 2001;
        }
        .close-btn { font-size: 1.5rem; cursor: pointer; padding: 5px 10px; border-radius: 5px; }
        .close-btn:hover { background: rgba(255,0,0,0.1); }
        .markdown-body { padding: 40px 20px; max-width: 800px; margin: 0 auto; }

        /* 사이드바 아이템 */
        .cat-title { cursor: pointer; font-weight: bold; padding: 10px; border-radius: 8px; background: rgba(128,128,128,0.1); margin: 10px 0 5px 0; }
        .sidebar-item { padding: 8px 12px; cursor: pointer; font-size: 0.9rem; color: var(--dim); border-radius: 6px; }
        .sidebar-item:hover { color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    </style>
</head>

<body class="dark">

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div onclick="toggleSidebar(event)" style="cursor:pointer; font-size: 1.5rem;">☰</div>
        <h1 style="margin:0; font-size: 1.1rem; cursor:pointer;" onclick="renderRoot()">📚 자료 아카이브</h1>
    </div>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div id="toc-toggle-btn" onclick="toggleTOC(event)" style="cursor:pointer; display:none; color:var(--primary); font-weight:bold;">목차</div>
        <div onclick="toggleTheme()" style="cursor:pointer; font-size: 1.2rem;">🌓</div>
    </div>
</header>

<main>
    <div class="overlay" onclick="closeAllPanels()"></div>
    <aside id="sidebar" class="panel"></aside>

    <section class="content">
        <div id="breadcrumb" class="breadcrumb" onclick="renderRoot()"></div>
        <div id="main-ui">
            <input id="search" style="width:100%; padding:14px; margin-bottom:25px; border-radius:12px; border:1px solid var(--border); background:var(--card); color:var(--text); box-sizing:border-box;" placeholder="자료 검색..." />
            <div id="content-grid" class="cards"></div>
        </div>
    </section>

    <div id="viewer">
        <div class="viewer-header">
            <div id="viewer-title" style="font-weight: bold;">파일명</div>
            <div style="display:flex; gap: 15px; align-items: center;">
                <button class="btn" onclick="copyLink()" style="background:var(--primary); color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">🔗 링크 복사</button>
                <div class="close-btn" onclick="closeMarkdown()">✕</div>
            </div>
        </div>
        <article id="md-content" class="markdown-body"></article>
    </div>

    <aside id="toc" class="panel"></aside>
</main>

<script src="https://unpkg.com/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js/lib/common.min.js"></script>

<script>
    let allData = [];
    let currentCategory = null;

    const sidebar = document.getElementById('sidebar');
    const toc = document.getElementById('toc');
    const contentGrid = document.getElementById('content-grid');
    const breadcrumb = document.getElementById('breadcrumb');
    const viewer = document.getElementById('viewer');

    // 1. 데이터 로드
    fetch('data.json').then(r => r.json()).then(data => {
        allData = data;
        renderSidebar(data);
        renderRoot();
        
        const file = new URLSearchParams(window.location.search).get('file');
        if(file) openMarkdown(file);
    });

    // 2. 루트 렌더링 (폴더 목록)
    function renderRoot() {
        currentCategory = null;
        breadcrumb.innerHTML = "";
        const categories = [...new Set(allData.map(item => item.category))];
        
        contentGrid.innerHTML = "";
        categories.forEach(cat => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<span>📁</span><strong>${cat}</strong>`;
            card.onclick = () => renderCategory(cat);
            contentGrid.appendChild(card);
        });
        window.scrollTo(0,0);
    }

    // 3. 특정 카테고리 진입 (파일 목록)
    function renderCategory(cat) {
        currentCategory = cat;
        breadcrumb.innerHTML = `← 홈으로 돌아가기 (${cat})`;
        
        const files = allData.filter(item => item.category === cat);
        contentGrid.innerHTML = "";
        files.forEach(file => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.padding = "20px";
            card.innerHTML = `<span>📄</span><div style="font-size:0.9rem">${file.title}</div>`;
            card.onclick = () => openMarkdown(file.path);
            contentGrid.appendChild(card);
        });
        closeAllPanels();
        window.scrollTo(0,0);
    }

    // 4. 사이드바 렌더링 (버그 수정: 카테고리 클릭 시 즉시 이동)
    function renderSidebar(data) {
        const categories = [...new Set(data.map(item => item.category))];
        sidebar.innerHTML = "<h3>카테고리</h3>";
        
        categories.forEach(cat => {
            const title = document.createElement('div');
            title.className = 'cat-title';
            title.innerHTML = `📁 ${cat}`;
            title.onclick = (e) => {
                e.stopPropagation();
                renderCategory(cat);
            };
            sidebar.appendChild(title);
        });
    }

    // 5. 팝업 뷰어 열기 (z-index 처리)
    function openMarkdown(path) {
        const item = allData.find(d => d.path === path);
        document.getElementById('viewer-title').textContent = item ? item.title : "문서 보기";

        fetch(path)
            .then(r => r.ok ? r.text() : Promise.reject())
            .then(md => {
                viewer.style.display = 'block';
                document.body.style.overflow = 'hidden'; // 배경 스크롤 방지
                document.getElementById('toc-toggle-btn').style.display = 'block';

                document.getElementById('md-content').innerHTML = marked.parse(md);
                
                if (window.hljs) {
                    document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
                }

                generateTOC();
                history.pushState(null, "", `?file=${path}`);
            })
            .catch(() => alert("파일을 로드할 수 없습니다."));
    }

    function closeMarkdown() {
        viewer.style.display = 'none';
        document.body.style.overflow = 'auto';
        document.getElementById('toc-toggle-btn').style.display = 'none';
        closeAllPanels();
        history.pushState(null, "", window.location.pathname);
    }

    // 6. 패널 제어 (2번 클릭 버그 해결)
    function toggleSidebar(e) {
        if(e) e.stopPropagation();
        const isActive = sidebar.classList.contains('active');
        closeAllPanels(); // 일단 다 닫고
        if(!isActive) sidebar.classList.add('active'); // 꺼져있었으면 켠다
        updateOverlay();
    }

    function toggleTOC(e) {
        if(e) e.stopPropagation();
        const isActive = toc.classList.contains('active');
        closeAllPanels();
        if(!isActive) toc.classList.add('active');
        updateOverlay();
    }

    function closeAllPanels() {
        sidebar.classList.remove('active');
        toc.classList.remove('active');
        updateOverlay();
    }

    function updateOverlay() {
        const anyActive = sidebar.classList.contains('active') || toc.classList.contains('active');
        document.body.classList.toggle('panel-open', anyActive);
    }

    // 목차 생성 및 기타 기능
    function generateTOC() {
        toc.innerHTML = "<h3>목차</h3><hr>";
        document.getElementById('md-content').querySelectorAll('h1, h2, h3').forEach((h, i) => {
            h.id = "h-" + i;
            const item = document.createElement('div');
            item.className = 'sidebar-item';
            item.textContent = h.textContent;
            item.onclick = () => { h.scrollIntoView({behavior:'smooth'}); closeAllPanels(); };
            toc.appendChild(item);
        });
    }

    function toggleTheme() {
        document.body.classList.toggle('dark');
        document.body.classList.toggle('light');
    }

    function copyLink() {
        navigator.clipboard.writeText(window.location.href).then(() => alert("링크가 복사되었습니다!"));
    }

    // 검색 로직
    document.getElementById('search').oninput = (e) => {
        const k = e.target.value.toLowerCase();
        if(!k) { renderRoot(); return; }
        
        const filtered = allData.filter(i => i.title.toLowerCase().includes(k) || i.category.toLowerCase().includes(k));
        breadcrumb.innerHTML = `🔍 검색 결과: ${k}`;
        contentGrid.innerHTML = "";
        filtered.forEach(file => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<span>📄</span><div style="font-size:0.9rem">${file.title}</div>`;
            card.onclick = () => openMarkdown(file.path);
            contentGrid.appendChild(card);
        });
    };
</script>

</body>
</html>
