<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자료 아카이브</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js/styles/github-dark.min.css">
    
    <style>
        :root { 
            --primary: #3b82f6; 
            --sidebar-width: 280px;
        }

        body.dark { --bg:#0f172a; --card:#1e293b; --text:#f8fafc; --dim:#94a3b8; --border: #334155; }
        body.light { --bg:#f8fafc; --card:#fff; --text:#0f172a; --dim:#64748b; --border: #e2e8f0; }

        body { margin:0; font-family: system-ui, -apple-system, sans-serif; background:var(--bg); color:var(--text); transition: background 0.3s; overflow-x: hidden; }

        header {
            display:flex; justify-content:space-between; align-items: center;
            padding:10px 20px; border-bottom:1px solid var(--border);
            position: sticky; top: 0; background: var(--bg); z-index: 1000;
        }

        /* 🔥 사이드바 디자인 */
        #sidebar { 
            width: var(--sidebar-width); 
            border-right: 1px solid var(--border); 
            padding: 1rem;
            background: var(--bg);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: fixed; top: 60px; bottom: 0; left: 0;
            z-index: 950;
            transform: translateX(-100%); /* 기본적으로 숨김 */
            overflow-y: auto;
        }
        #sidebar.active { transform: translateX(0); }

        /* 🔥 본문 오버레이 효과 (사이드바 열릴 때) */
        .content-overlay {
            position: fixed; top: 60px; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 900;
            display: none; /* 평소엔 숨김 */
            backdrop-filter: blur(2px);
        }
        body.sidebar-open .content-overlay { display: block; }

        .cat-group { margin-bottom: 1.5rem; }
        .cat-title { cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; padding: 10px; border-radius: 8px; background: rgba(128,128,128,0.1); margin-bottom: 5px; }
        .cat-items { overflow: hidden; transition: max-height 0.3s ease; }
        .cat-items.collapsed { max-height: 0; }
        .sidebar-item { padding: 8px 12px; cursor: pointer; font-size: 0.9rem; color: var(--dim); border-radius: 6px; }
        .sidebar-item:hover { color: var(--primary); background: rgba(59, 130, 246, 0.1); }

        .content { padding: 2rem; max-width: 900px; margin: 0 auto; min-height: 100vh; }
        #search { width: 100%; padding: 14px; margin-bottom: 25px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 1rem; }

        .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.2rem; }
        .card { padding: 24px; background: var(--card); border-radius: 14px; cursor: pointer; border: 1px solid var(--border); transition: 0.2s; }
        .card:hover { border-color: var(--primary); transform: translateY(-3px); }

        #viewer { display: none; }
        .markdown-body { padding: 20px; background: transparent !important; color: inherit !important; line-height: 1.7; }
        
        #toc { 
            width: 240px; border-left: 1px solid var(--border); padding: 1rem; background: var(--bg);
            position: fixed; top: 60px; bottom: 0; right: -260px;
            transition: 0.3s ease; z-index: 950;
        }
        #toc.active { right: 0; }
    </style>
</head>

<body class="dark">

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div onclick="toggleSidebar(event)" style="cursor:pointer; font-size: 1.5rem;">☰</div>
        <h1 style="margin:0; font-size: 1.1rem;">📚 자료 아카이브</h1>
    </div>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div id="toc-toggle" onclick="toggleTOC(event)" style="cursor:pointer; display:none; color:var(--primary); font-weight:600;">목차</div>
        <div onclick="toggleTheme()" style="cursor:pointer; font-size: 1.2rem;">🌓</div>
    </div>
</header>

<main class="layout">
    <div class="content-overlay" id="overlay" onclick="closeAllPanels()"></div>

    <aside id="sidebar"></aside>

    <section class="content" id="main-content">
        <div id="main-ui">
            <input id="search" placeholder="보고 싶은 자료를 검색하세요..." />
            <div id="content-grid" class="cards"></div>
        </div>

        <div id="viewer">
            <button onclick="closeMarkdown()" style="background:none; border:1px solid var(--dim); color:var(--dim); padding:8px 16px; border-radius:8px; cursor:pointer; margin-bottom:20px;">← 목록으로 돌아가기</button>
            <article id="md-content" class="markdown-body"></article>
        </div>
    </section>

    <aside id="toc"></aside>
</main>

<script src="https://cdn.jsdelivr.net/npm/highlight.js/lib/common.min.js"></script>

<script>
    /* 🛠 마크다운 파서 (제목, 볼드, 코드블록, 리스트 지원) */
    function miniMarked(md) {
        if (!md) return "";
        let html = md
            .replace(/^### (.*$)/gim, '<h3>$1</h3>')
            .replace(/^## (.*$)/gim, '<h2>$1</h2>')
            .replace(/^# (.*$)/gim, '<h1>$1</h1>')
            .replace(/^\- (.*$)/gim, '<ul><li>$1</li></ul>').replace(/<\/ul>\s*<ul>/g, "")
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/`(.*?)`/g, '<code>$1</code>');

        // 코드 블록 처리
        html = html.replace(/```([\s\S]*?)```/g, (match, code) => {
            return `<pre><code class="hljs">${code.trim()}</code></pre>`;
        });

        // 일반 줄바꿈 처리 (h태그 등이 아닌 경우만)
        return html.split('\n').map(line => {
            return line.startsWith('<') ? line : `<p>${line}</p>`;
        }).join('');
    }

    const sidebar = document.getElementById('sidebar');
    const toc = document.getElementById('toc');
    const grid = document.getElementById('content-grid');
    const mainUi = document.getElementById('main-ui');
    const viewer = document.getElementById('viewer');
    const mdContent = document.getElementById('md-content');
    const tocToggle = document.getElementById('toc-toggle');

    let allData = [];

    // 데이터 로드
    fetch('data.json').then(r => r.json()).then(data => {
        allData = data;
        renderSidebar(data);
        renderGrid(data);
    });

    // 📱 사이드바 및 패널 제어
    function toggleSidebar(e) {
        if(e) e.stopPropagation();
        const isOpen = sidebar.classList.toggle('active');
        document.body.classList.toggle('sidebar-open', isOpen);
    }

    function closeAllPanels() {
        sidebar.classList.remove('active');
        toc.classList.remove('active');
        document.body.classList.remove('sidebar-open');
    }

    function toggleTOC(e) {
        if(e) e.stopPropagation();
        toc.classList.toggle('active');
    }

    // 📱 스와이프 기능
    let touchStartX = 0;
    window.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX, {passive: true});
    window.addEventListener('touchend', e => {
        const touchEndX = e.changedTouches[0].screenX;
        const diff = touchEndX - touchStartX;
        
        // 오른쪽으로 밀기 (사이드바 열기)
        if (diff > 90 && touchStartX < window.innerWidth * 0.3) {
            if (!sidebar.classList.contains('active')) toggleSidebar();
        }
        // 왼쪽으로 밀기 (패널 닫기)
        if (diff < -90) closeAllPanels();
    }, {passive: true});

    // 마크다운 열기
    function openMarkdown(path) {
        fetch(path).then(r => r.text()).then(md => {
            mainUi.style.display = 'none';
            viewer.style.display = 'block';
            tocToggle.style.display = 'block';
            
            mdContent.innerHTML = miniMarked(md);
            document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
            
            closeAllPanels();
            window.scrollTo(0,0);
        });
    }

    function closeMarkdown() {
        mainUi.style.display = 'block';
        viewer.style.display = 'none';
        tocToggle.style.display = 'none';
        closeAllPanels();
    }

    function renderSidebar(data) {
        const grouped = data.reduce((acc, obj) => {
            acc[obj.category] = acc[obj.category] || [];
            acc[obj.category].push(obj);
            return acc;
        }, {});

        sidebar.innerHTML = '';
        Object.keys(grouped).forEach(cat => {
            const div = document.createElement('div');
            div.className = 'cat-group';
            div.innerHTML = `<div class="cat-title" onclick="this.nextSibling.classList.toggle('collapsed')">${cat} ▾</div>`;
            const items = document.createElement('div');
            items.className = 'cat-items';
            grouped[cat].forEach(i => {
                const item = document.createElement('div');
                item.className = 'sidebar-item';
                item.textContent = i.title;
                item.onclick = () => openMarkdown(i.path);
                items.appendChild(item);
            });
            div.appendChild(items);
            sidebar.appendChild(div);
        });
    }

    function renderGrid(data) {
        grid.innerHTML = '';
        data.forEach(i => {
            const c = document.createElement('div');
            c.className = 'card';
            c.innerHTML = `<strong>${i.title}</strong><div style="margin-top:8px; font-size:0.8rem; color:var(--dim)">${i.category}</div>`;
            c.onclick = () => openMarkdown(i.path);
            grid.appendChild(c);
        });
    }

    function toggleTheme() {
        document.body.classList.toggle('dark');
        document.body.classList.toggle('light');
    }

    document.getElementById('search').oninput = (e) => {
        const k = e.target.value.toLowerCase();
        renderGrid(allData.filter(i => i.title.toLowerCase().includes(k)));
    };
</script>

</body>
</html>
