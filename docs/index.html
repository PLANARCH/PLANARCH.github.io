<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>자료 아카이브</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js/lib/common.min.js"></script>

<style>
:root { --primary:#3b82f6; }

body.dark { --bg:#0f172a; --card:#1e293b; --text:#f8fafc; }
body.light { --bg:#f8fafc; --card:#fff; --text:#0f172a; }

body { margin:0; font-family:system-ui; background:var(--bg); color:var(--text); }

header {
  display:flex; justify-content:space-between;
  padding:10px 20px; border-bottom:1px solid #555;
}

.layout { display:grid; grid-template-columns:auto 1fr; }

.content { padding:1rem; }

.cards {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:0.8rem;
}

.card {
  height:100px;
  display:flex;
  justify-content:center;
  align-items:center;
  background:var(--card);
  border-radius:10px;
  cursor:pointer;
}

#viewer { display:none; }

.markdown-body { max-width:800px; margin:auto; }

/* editor */
#editor {
  display:none;
  padding:1rem;
  background:var(--card);
  border-radius:10px;
  margin-bottom:1rem;
}

textarea { width:100%; height:200px; }

/* preview */
#preview img {
  max-width:150px;
  margin:5px;
}
</style>
</head>

<body class="dark">

<header>
  <h1>📚 자료 아카이브</h1>
  <div>
    <button onclick="login()">🔐 로그인</button>
    <button onclick="toggleEditor()">✏️ 글쓰기</button>
  </div>
</header>

<main class="layout">
  <section class="content">

    <!-- EDITOR -->
    <div id="editor">
      <input id="title" placeholder="파일명 (react.md)" /><br><br>
      <input id="category" placeholder="카테고리 (frontend)" /><br><br>

      <div id="dropzone" style="border:2px dashed #888; padding:20px;">
        📂 이미지 드롭
      </div>

      <div id="preview"></div>

      <textarea id="content"></textarea><br>
      <button onclick="savePost()">💾 저장</button>
    </div>

    <div id="content-grid"></div>
    <div id="viewer"></div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
marked.setOptions({ breaks:true });

const owner="PLANARCH";
const repo="PLANARCH.github.io";

const grid=document.getElementById('content-grid');
const viewer=document.getElementById('viewer');

let currentEditPath=null;

// 로그인
function login(){
  const t=prompt("Token 입력");
  localStorage.setItem("github_token",t);
}

// 에디터
function toggleEditor(){
  const ed=document.getElementById("editor");
  ed.style.display = ed.style.display==="none"?"block":"none";
}

// LOAD
fetch('data.json')
.then(r=>r.json())
.then(data=>render(data));

// 카드
function render(data){
  grid.innerHTML='';
  data.forEach(i=>{
    const card=document.createElement('div');
    card.className='card';
    card.textContent=i.title;

    card.onclick=()=>openMarkdown(i.path);
    card.ondblclick=()=>editPost(i);

    grid.appendChild(card);
  });
}

// MARKDOWN 보기
function openMarkdown(path){
  fetch(path)
  .then(r=>r.text())
  .then(md=>{
    viewer.innerHTML=`
      <button onclick="editFromViewer('${path}')">✏️ 수정</button>
      <div class="markdown-body">${marked.parse(md)}</div>
    `;

    grid.style.display='none';
    viewer.style.display='block';

    document.querySelectorAll('pre code').forEach(b=>hljs.highlightElement(b));
  });
}

// viewer에서 수정
function editFromViewer(path){
  fetch(path)
  .then(r=>r.text())
  .then(md=>{
    toggleEditor();

    document.getElementById("content").value=md;
    currentEditPath=path;
  });
}

// 카드에서 수정
function editPost(item){
  fetch(item.path)
  .then(r=>r.text())
  .then(md=>{
    toggleEditor();
    document.getElementById("title").value=item.title+".md";
    document.getElementById("category").value=item.category;
    document.getElementById("content").value=md;

    currentEditPath=item.path;
  });
}

// 저장
async function savePost(){
  const token=localStorage.getItem("github_token");
  if(!token) return alert("로그인");

  const title=document.getElementById("title").value;
  const category=document.getElementById("category").value;
  const content=document.getElementById("content").value;

  const path=currentEditPath || `docs/${category}/${title}`;

  let sha=null;

  // 수정이면 sha 필요
  if(currentEditPath){
    const res=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`);
    const data=await res.json();
    sha=data.sha;
  }

  await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`,{
    method:"PUT",
    headers:{
      "Authorization":`token ${token}`,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      message:"update",
      content:btoa(unescape(encodeURIComponent(content))),
      sha: sha
    })
  });

  alert("완료");
  location.reload();
}

// 이미지 드롭
const dropzone=document.getElementById("dropzone");

dropzone.addEventListener("dragover",e=>e.preventDefault());

dropzone.addEventListener("drop",e=>{
  e.preventDefault();

  const file=e.dataTransfer.files[0];
  const reader=new FileReader();

  reader.onload=async function(){
    const base64=reader.result.split(',')[1];

    const token=localStorage.getItem("github_token");
    const category=document.getElementById("category").value;

    const path=`docs/${category}/img/${file.name}`;

    await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`,{
      method:"PUT",
      headers:{
        "Authorization":`token ${token}`,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        message:"img upload",
        content:base64
      })
    });

    const url=`https://raw.githubusercontent.com/${owner}/${repo}/main/${path}`;

    // preview
    const preview=document.getElementById("preview");
    const img=document.createElement("img");
    img.src=url;
    preview.appendChild(img);

    // md 삽입
    const textarea=document.getElementById("content");
    textarea.value += `\n\n![${file.name}](${url})\n`;
  };

  reader.readAsDataURL(file);
});
</script>

</body>
</html>
