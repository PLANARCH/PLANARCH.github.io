<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자료 아카이브</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js/styles/github-dark.min.css">
    
    <style>
        :root { 
            --primary: #3b82f6; 
            --sidebar-width: 260px;
            --toc-width: 240px;
        }

        body.dark { --bg:#0f172a; --card:#1e293b; --text:#f8fafc; --dim:#94a3b8; --border: #334155; }
        body.light { --bg:#f8fafc; --card:#fff; --text:#0f172a; --dim:#64748b; --border: #e2e8f0; }

        body { margin:0; font-family: 'Pretendard', system-ui, sans-serif; background:var(--bg); color:var(--text); transition: background 0.3s; overflow-x: hidden; }

        header {
            display:flex; justify-content:space-between; align-items: center;
            padding:10px 20px; border-bottom:1px solid var(--border);
            position: sticky; top: 0; background: var(--bg); z-index: 1000;
        }

        .layout { display: flex; min-height: calc(100vh - 60px); position: relative; }

        /* 🔥 사이드바 (기본 숨김) */
        #sidebar { 
            width: var(--sidebar-width); 
            border-right: 1px solid var(--border); 
            padding: 1rem;
            background: var(--bg);
            transition: all 0.3s ease-in-out;
            overflow-y: auto;
            position: fixed; /* 본문을 클릭할 때 방해받지 않도록 고정 */
            top: 60px; bottom: 0; left: calc(var(--sidebar-width) * -1 - 2rem);
            z-index: 900;
            opacity: 0;
            visibility: hidden;
        }

        #sidebar.active { left: 0; opacity: 1; visibility: visible; }

        .cat-group { margin-bottom: 15px; }
        .cat-title { 
            cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; 
            padding: 8px; border-radius: 6px; background: rgba(128,128,128,0.1); margin-bottom: 5px;
        }
        .cat-items { overflow: hidden; transition: max-height 0.3s ease; }
        .cat-items.collapsed { max-height: 0; }

        .sidebar-item { 
            padding: 6px 12px; cursor: pointer; font-size: 0.9rem; color: var(--dim); 
            border-radius: 4px; transition: 0.2s;
        }
        .sidebar-item:hover { color: var(--primary); background: rgba(59, 130, 246, 0.1); }

        /* 🔥 메인 본문 영역 */
        .content { 
            flex: 1; padding: 2rem; max-width: 1000px; margin: 0 auto; 
            transition: opacity 0.3s ease; 
            min-height: 100vh;
        }
        
        /* 사이드바가 열렸을 때 본문에 살짝 투명 효과를 주어 클릭 유도 */
        body.sidebar-open .content { opacity: 0.5; cursor: pointer; }

        #search {
            width: 100%; padding: 12px; margin-bottom: 20px;
            border-radius: 10px; border: 1px solid var(--border);
            background: var(--card); color: var(--text); outline: none;
        }

        .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
        .card { padding: 20px; background: var(--card); border-radius: 12px; cursor: pointer; border: 1px solid var(--border); transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }

        #viewer { display: none; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; background: var(--primary); color: white; font-weight: bold; }
        .btn-secondary { background: var(--dim); }

        /* 마크다운 컨텐츠 박스 */
        .markdown-body { 
            padding: 20px; 
            background: transparent !important; 
            color: inherit !important; 
            font-size: 16px;
            line-height: 1.6;
        }
        body.dark .markdown-body { color: #e6edf3; }

        /* 🔥 목차(TOC) (기본 숨김) */
        #toc { 
            width: var(--toc-width); 
            border-left: 1px solid var(--border); 
            padding: 1rem;
            background: var(--bg);
            transition: all 0.3s ease;
            position: fixed; top: 60px; bottom: 0; right: calc(var(--toc-width) * -1 - 2rem);
            z-index: 900;
            opacity: 0;
            visibility: hidden;
            overflow-y: auto;
        }
        #toc.active { right: 0; opacity: 1; visibility: visible; }

        @media (max-width: 768px) { #toc, #toc-toggle { display: none !important; } }
    </style>
</head>

<body class="dark">

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div onclick="toggleSidebar(event)" style="cursor:pointer; font-size: 1.5rem; user-select: none;">☰</div>
        <h1 style="margin:0; font-size: 1.2rem;">📚 자료 아카이브</h1>
    </div>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div id="toc-toggle" onclick="toggleTOC(event)" style="cursor:pointer; font-size: 1rem; color: var(--primary); display: none;">(목차)</div>
        <div onclick="toggleTheme()" style="cursor:pointer; font-size: 1.2rem; user-select: none;">🌓</div>
    </div>
</header>

<main class="layout" id="main-layout">
    <aside id="sidebar"></aside>

    <section class="content" id="main-content">
        <div id="main-ui">
            <input id="search" placeholder="검색어를 입력하세요..." />
            <div id="content-grid"></div>
        </div>

        <div id="viewer">
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="closeMarkdown()">← 목록으로</button>
                <button class="btn" onclick="copyLink()">🔗 링크 복사</button>
            </div>
            <article id="md-content" class="markdown-body"></article>
        </div>
    </section>

    <aside id="toc"></aside>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js/lib/common.min.js"></script>

<script>
    // 마크다운 설정
    const renderer = new marked.Renderer();
    marked.setOptions({
        renderer: renderer,
        gfm: true,
        breaks: true,
        highlight: function(code, lang) {
            const language = hljs.getLanguage(lang) ? lang : 'plaintext';
            return hljs.highlight(code, { language }).value;
        }
    });

    const sidebar = document.getElementById('sidebar');
    const toc = document.getElementById('toc');
    const contentArea = document.getElementById('main-content');
    const grid = document.getElementById('content-grid');
    const mainUi = document.getElementById('main-ui');
    const viewer = document.getElementById('viewer');
    const mdContent = document.getElementById('md-content');
    const tocToggle = document.getElementById('toc-toggle');

    let allData = [];

    // 1. 데이터 로드
    fetch('data.json')
    .then(r => r.json())
    .then(data => {
        allData = data;
        renderSidebar(data);
        renderGrid(data);
        const params = new URLSearchParams(window.location.search);
        if(params.has('file')) openMarkdown(params.get('file'));
    });

    // 2. 🔥 사이드바 토글 및 외부 클릭 닫기
    function toggleSidebar(e) {
        if(e) e.stopPropagation();
        sidebar.classList.toggle('active');
        document.body.classList.toggle('sidebar-open', sidebar.classList.contains('active'));
    }

    // 메인 영역 클릭 시 사이드바 닫기
    contentArea.addEventListener('click', () => {
        if (sidebar.classList.contains('active')) {
            sidebar.classList.remove('active');
            document.body.classList.remove('sidebar-open');
        }
        if (toc.classList.contains('active')) {
            toc.classList.remove('active');
        }
    });

    // 3. 마크다운 열기 (렌더링 핵심)
    function openMarkdown(path) {
        fetch(path)
        .then(r => r.text())
        .then(md => {
            mainUi.style.display = 'none';
            viewer.style.display = 'block';
            tocToggle.style.display = 'block';

            // 🔥 마크다운 변환 및 주입
            mdContent.innerHTML = marked.parse(md);

            // 코드 하이라이팅 재적용
            document.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
            
            generateTOC();
            history.pushState(null, "", `?file=${path}`);
            window.scrollTo(0,0);
            
            // 사이드바 닫기
            sidebar.classList.remove('active');
            document.body.classList.remove('sidebar-open');
        })
        .catch(err => {
            mdContent.innerHTML = "<p>문서를 불러오는 중 오류가 발생했습니다.</p>";
        });
    }

    // 4. 기타 UI 제어
    function closeMarkdown() {
        mainUi.style.display = 'block';
        viewer.style.display = 'none';
        tocToggle.style.display = 'none';
        toc.classList.remove('active');
        history.pushState(null, "", window.location.pathname);
    }

    function toggleTOC(e) {
        if(e) e.stopPropagation();
        toc.classList.toggle('active');
    }

    function renderSidebar(data) {
        sidebar.innerHTML = '';
        const grouped = groupByCategory(data);
        Object.keys(grouped).forEach(cat => {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'cat-group';
            const title = document.createElement('div');
            title.className = 'cat-title';
            title.innerHTML = `<span>${cat}</span><span>▾</span>`;
            const itemContainer = document.createElement('div');
            itemContainer.className = 'cat-items';
            title.onclick = (e) => {
                e.stopPropagation();
                itemContainer.classList.toggle('collapsed');
                title.querySelector('span:last-child').innerText = itemContainer.classList.contains('collapsed') ? '▸' : '▾';
            };
            grouped[cat].forEach(i => {
                const item = document.createElement('div');
                item.className = 'sidebar-item';
                item.textContent = i.title;
                item.onclick = (e) => { e.stopPropagation(); openMarkdown(i.path); };
                itemContainer.appendChild(item);
            });
            groupDiv.appendChild(title);
            groupDiv.appendChild(itemContainer);
            sidebar.appendChild(groupDiv);
        });
    }

    function renderGrid(data) {
        grid.innerHTML = '';
        data.forEach(i => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div style="font-weight:bold; margin-bottom:10px;">${i.title}</div><div style="font-size:0.75rem; color:var(--dim)">${i.category}</div>`;
            card.onclick = () => openMarkdown(i.path);
            grid.appendChild(card);
        });
    }

    function generateTOC() {
        toc.innerHTML = "<strong>목차</strong><hr>";
        mdContent.querySelectorAll('h1, h2, h3').forEach((h, idx) => {
            h.id = `header-${idx}`;
            const link = document.createElement('div');
            link.className = 'sidebar-item';
            link.style.fontSize = '0.8rem';
            link.textContent = h.textContent;
            link.onclick = (e) => { e.stopPropagation(); h.scrollIntoView({ behavior: 'smooth' }); };
            toc.appendChild(link);
        });
    }

    function groupByCategory(data) {
        return data.reduce((acc, obj) => {
            const key = obj.category;
            if (!acc[key]) acc[key] = [];
            acc[key].push(obj);
            return acc;
        }, {});
    }

    function toggleTheme() {
        document.body.classList.toggle('dark');
        document.body.classList.toggle('light');
    }

    function copyLink() {
        navigator.clipboard.writeText(location.href);
        alert("링크가 복사되었습니다!");
    }

    const searchInput = document.getElementById('search');
    searchInput.addEventListener('input', e => {
        const k = e.target.value.toLowerCase();
        renderGrid(allData.filter(i => i.title.toLowerCase().includes(k)));
    });
</script>

</body>
</html>
