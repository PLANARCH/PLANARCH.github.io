<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자료 아카이브</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js/styles/github-dark.min.css">
    
    <style>
        :root { --primary: #3b82f6; --sidebar-width: 280px; }
        body.dark { --bg:#0f172a; --card:#1e293b; --text:#f8fafc; --dim:#94a3b8; --border: #334155; }
        body.light { --bg:#f8fafc; --card:#fff; --text:#0f172a; --dim:#64748b; --border: #e2e8f0; }
        body { margin:0; font-family: system-ui, sans-serif; background:var(--bg); color:var(--text); transition: background 0.3s; overflow-x: hidden; }
        header { display:flex; justify-content:space-between; align-items: center; padding:10px 20px; border-bottom:1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 1100; }

        .panel { background: var(--bg); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: fixed; top: 60px; bottom: 0; z-index: 1500; overflow-y: auto; box-shadow: 0 0 15px rgba(0,0,0,0.3); }
        #sidebar { width: var(--sidebar-width); left: 0; transform: translateX(-100%); border-right: 1px solid var(--border); padding: 1rem; }
        #sidebar.active { transform: translateX(0); }

        .cat-group { margin-bottom: 8px; }
        .cat-header { display: flex; justify-content: space-between; align-items: center; padding: 10px; cursor: pointer; border-radius: 8px; transition: 0.2s; font-weight: 600; background: rgba(128,128,128,0.05); }
        .cat-header:hover { background: rgba(59, 130, 246, 0.1); }
        .sub-list { display: none; padding-left: 15px; margin-top: 5px; border-left: 1px solid var(--border); margin-left: 10px; }
        .sub-item { padding: 6px 10px; font-size: 0.85rem; color: var(--dim); cursor: pointer; border-radius: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .sub-item:hover { color: var(--primary); background: rgba(59, 130, 246, 0.05); }

        .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.4); z-index: 1400; display: none; backdrop-filter: blur(2px); }
        body.panel-open .overlay { display: block; }

        .content { padding: 2rem; max-width: 1000px; margin: 0 auto; min-height: 100vh; }
        .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.2rem; }
        .card { padding: 20px; background: var(--card); border-radius: 14px; cursor: pointer; border: 1px solid var(--border); transition: 0.2s; display: flex; flex-direction: column; align-items: center; text-align: center; word-break: break-all; overflow: hidden; }
        .card:hover { border-color: var(--primary); transform: translateY(-3px); }
        .card strong { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; margin-top: 8px; }
        .card .icon { font-size: 2.2rem; }

        #viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; overflow-y: auto; visibility: hidden; opacity: 0; transform: translateY(30px); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease, visibility 0.4s; }
        #viewer.active { visibility: visible; opacity: 1; transform: translateY(0); }
        /* 뷰어 헤더가 항상 위에 보이도록 설정 */
        .viewer-header {
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 2100; /* 내용물(2000)보다 높게 */
            display: flex;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            align-items: center;
        }

        /* 제목 텍스트 스타일 */
        #viewer-title {
            flex: 1; /* 닫기 버튼을 오른쪽으로 밀어냄 */
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .viewer-close { font-size: 1.8rem; cursor: pointer; }
        /* 스타일 태그 내에 추가 */
        .markdown-body {
            padding: 20px 25px 60px 25px; /* 상 20, 좌우 25, 하 60 */
            max-width: 900px;
            margin: 0 auto;
            background: transparent !important;
            color: var(--text) !important;
        }

        /* 다크모드일 때 코드 블록 배경색 최적화 */
        body.dark .markdown-body pre {
            background-color: #0d1117 !important;
            border: 1px solid var(--border);
            border-radius: 8px;
        }
    </style>
</head>

<body class="dark">

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div onclick="toggleSidebar(event)" style="cursor:pointer; font-size: 1.5rem;">☰</div>
        <h1 style="margin:0; font-size: 1.1rem; cursor:pointer;" onclick="renderRootFolders()">📚 자료 아카이브</h1>
    </div>
    <div onclick="toggleTheme()" style="cursor:pointer; font-size: 1.2rem;">🌓</div>
</header>

<main>
    <div class="overlay" onclick="closeAllPanels()"></div>
    <aside id="sidebar" class="panel"></aside>

    <section class="content">
        <div id="breadcrumb" class="breadcrumb" style="margin-bottom:20px; color:var(--primary); cursor:pointer; display:none;" onclick="renderRootFolders()">← 홈으로</div>
        <div id="main-ui">
            <input id="search" placeholder="자료 검색..." style="width:100%; padding:14px; margin-bottom:25px; border-radius:12px; border:1px solid var(--border); background:var(--card); color:var(--text); box-sizing:border-box; outline:none;" />
            <div id="content-grid" class="cards"></div>
        </div>
    </section>

    <div id="viewer">
        <div class="viewer-header">
            <div id="viewer-title" style="font-weight:bold; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:70%;"></div>
            <div style="display:flex; gap:10px; align-items:center;">
                <button onclick="copyLink()" style="padding:6px 12px; border-radius:6px; background:var(--primary); color:white; border:none; cursor:pointer; font-size:0.85rem;">🔗 링크 복사</button>
                <div class="viewer-close" onclick="closeMarkdown()">×</div>
            </div>
        </div>
        <article id="md-content" class="markdown-body"></article>
    </div>
</main>

<script src="https://unpkg.com/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js/lib/common.min.js"></script>

<script>
    let mdCache = {};          
    let allData = [];
    let currentCategory = null;
    const VERSION = Date.now(); // 1. 앱 로드 시점의 타임스탬프 생성

    const sidebar = document.getElementById('sidebar');
    const contentGrid = document.getElementById('content-grid');
    const breadcrumb = document.getElementById('breadcrumb');
    const viewer = document.getElementById('viewer');
    const mdContent = document.getElementById('md-content');

    const savedTheme = localStorage.getItem('archive-theme') || 'dark';
    document.body.className = savedTheme;

    function toggleTheme() {
        const newTheme = document.body.classList.contains('dark') ? 'light' : 'dark';
        document.body.className = newTheme;
        localStorage.setItem('archive-theme', newTheme);
    }

    // 2. data.json 로드 시 캐시 방지
    fetch(`data.json?v=${VERSION}`)
    .then(r => {
        if (!r.ok) throw new Error(`HTTP 에러! 상태코드: ${r.status}`);
        return r.json();
    })
    .then(data => {
        allData = data;
        renderSidebar(data);
        handleInitialRoute(); 
    })
    .catch(err => {
        document.getElementById('content-grid').innerHTML = `<div style="text-align:center; padding:50px; color:var(--dim);"><h3>데이터를 불러올 수 없습니다.</h3><p>${err.message}</p></div>`;
    });

    async function handleInitialRoute() {
        const params = new URLSearchParams(window.location.search);
        const file = params.get('file');
        const folder = params.get('folder');

        // 1. 기본 배경 상태 정의 (루트)
        // replaceState는 현재 히스토리를 덮어씁니다. (구글 바로 다음 단계를 '홈'으로 설정)
        history.replaceState({view: 'root'}, "", window.location.pathname);

        if (file) {
            // "TEST/react.md"에서 "TEST" 추출
            const category = file.split('/')[0];
            
            // 2. 폴더 단계를 히스토리에 한 층 쌓음 
            // 이제 히스토리는 [구글] -> [홈] -> [폴더(?folder=TEST)] 가 됩니다.
            history.pushState({view: 'folder', cat: category}, "", `?folder=${encodeURIComponent(category)}`);
            
            // 배경에 폴더 목록을 미리 렌더링
            renderCategoryFiles(category, false, false);
            
            // 3. 마지막으로 파일을 엶 (pushHistory: true)
            // 최종 히스토리: [구글] -> [홈] -> [폴더] -> [파일(?file=...)]
            openMarkdown(file, true); 

        } else if (folder) {
            // 폴더로 직접 들어온 경우: [구글] -> [홈] -> [폴더] 순서로 구성
            history.pushState({view: 'folder', cat: folder}, "", `?folder=${encodeURIComponent(folder)}`);
            renderCategoryFiles(folder, false, false);
        } else {
            renderRootFolders(false);
        }
    }

    function renderRootFolders(pushHistory = true) {
        currentCategory = null;
        if (pushHistory) history.pushState({view: 'root'}, "", window.location.pathname);
        breadcrumb.style.display = 'none';
        contentGrid.innerHTML = '';
        const categories = [...new Set(allData.map(item => item.category))];
        categories.forEach(cat => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="icon">📁</div><strong>${cat}</strong>`;
            card.onclick = () => renderCategoryFiles(cat);
            contentGrid.appendChild(card);
        });
    }

    async function renderCategoryFiles(cat, keepSidebar = false, pushHistory = true) {
        currentCategory = cat;
        if (pushHistory) history.pushState({view: 'folder', cat: cat}, "", `?folder=${encodeURIComponent(cat)}`);
        breadcrumb.style.display = 'block';
        breadcrumb.textContent = `← 홈으로 (${cat})`;
        contentGrid.innerHTML = '';
        allData.filter(i => i.category === cat).forEach(i => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="icon">📄</div><strong>${i.title}</strong>`;
            card.onclick = () => openMarkdown(i.path);
            contentGrid.appendChild(card);
        });
        if (!keepSidebar) closeAllPanels();
    }

    // 3. 이미지 및 마크다운 내 리소스 캐시 방지 적용
    function fixImagePaths(md, path) {
        // 1. path: "TEST/react.md" -> folder: "TEST" 추출
        const folder = path.substring(0, path.lastIndexOf('/')); 
        
        return md.replace(/!\[(.*?)\]\((?!http|\/)(.*?)\)/g, (match, alt, src) => {
            // 2. folder가 있으면 "TEST/photo/photo.jpg", 없으면 그냥 "photo/photo.jpg"
            // 쿼리 스트링(?v=...)을 붙여 캐시 방지
            const fixedPath = folder ? `${folder}/${src}?v=${VERSION}` : `${src}?v=${VERSION}`;
            
            console.log("🛠️ 실제 이미지 요청 주소:", window.location.origin + "/" + fixedPath);
            return `![${alt}](${fixedPath})`;
        });
    }

    function fixHeaderSpacing(md) {
        // 줄 시작부분의 #...# 뒤에 공백이 없으면 공백을 추가
        // 예: #TEST -> # TEST, ###제목 -> ### 제목
        return md.replace(/^(#{1,6})([^#\s\d])/gm, '$1 $2');
    }

    async function openMarkdown(path, pushHistory = true) {
        // 🌟 [제목 복구] 데이터에서 찾거나 파일명에서 추출
        const item = allData.find(d => d.path === path);
        const title = item ? item.title : path.split('/').pop().replace('.md', '');
        
        const titleElement = document.getElementById('viewer-title');
        if (titleElement) titleElement.textContent = title;

        try {
            // 파일 로드 (캐시 방지 v= 포함)
            let md = mdCache[path] || await fetch(`${path}?v=${VERSION}`).then(r => r.text());
            mdCache[path] = md;

            // 2. 이미지 경로 보정 실행
            let processedMd = fixImagePaths(md, path);
            
            // 3. 🌟 [추가] 헤더 스페이싱 보정 실행 (#제목 -> # 제목)
            processedMd = fixHeaderSpacing(processedMd);
            
            // 4. 보정된 마크다운 파싱 및 렌더링
            mdContent.innerHTML = marked.parse(processedMd);
            
            viewer.classList.add('active'); 
            document.body.style.overflow = 'hidden';

            if (window.hljs) document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));

            // 히스토리 관리 (뒤로가기 제스처 대응)
            if (pushHistory) {
                const currentFile = new URLSearchParams(window.location.search).get('file');
                if (currentFile !== path) {
                    history.pushState({view: 'file', path: path}, "", `?file=${encodeURIComponent(path)}`);
                }
            }
            closeAllPanels();
        } catch (e) {
            console.error("로드 에러:", e);
            mdContent.innerHTML = "<p style='padding:20px;'>문서를 불러오는 중 오류가 발생했습니다.</p>";
        }
    }

    function closeMarkdown() {
        if (new URLSearchParams(window.location.search).get('file')) history.back();
        else { viewer.classList.remove('active'); document.body.style.overflow = 'auto'; }
    }

    function renderSidebar(data) {
        const grouped = data.reduce((acc, obj) => {
            acc[obj.category] = acc[obj.category] || [];
            acc[obj.category].push(obj);
            return acc;
        }, {});
        sidebar.innerHTML = "<h3 style='margin-bottom:15px;'>카테고리</h3>";
        Object.keys(grouped).forEach(cat => {
            const group = document.createElement('div');
            group.className = 'cat-group';
            const header = document.createElement('div');
            header.className = 'cat-header';
            header.innerHTML = `<span>📁 ${cat}</span><small>▾</small>`;
            const list = document.createElement('div');
            list.className = 'sub-list';
            header.onclick = (e) => {
                const isOpen = list.style.display === 'block';
                list.style.display = isOpen ? 'none' : 'block';
                header.querySelector('small').textContent = isOpen ? '▾' : '▴';
                renderCategoryFiles(cat, true);
            };
            grouped[cat].forEach(file => {
                const item = document.createElement('div');
                item.className = 'sub-item';
                item.textContent = `📄 ${file.title}`;
                item.onclick = (e) => { e.stopPropagation(); openMarkdown(file.path); };
                list.appendChild(item);
            });
            group.appendChild(header); group.appendChild(list); sidebar.appendChild(group);
        });
    }

    function toggleSidebar(e) { e.stopPropagation(); sidebar.classList.toggle('active'); updateOverlay(); }
    function closeAllPanels() { sidebar.classList.remove('active'); updateOverlay(); }
    function updateOverlay() { document.body.classList.toggle('panel-open', sidebar.classList.contains('active')); }
    function copyLink() {
        const btn = event.target;
        const originalText = btn.textContent;
        
        navigator.clipboard.writeText(window.location.href).then(() => {
            btn.textContent = "✅ 복사됨!";
            btn.style.background = "#10b981"; // 초록색으로 변경
            
            setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = "var(--primary)";
            }, 2000);
        });
    }

    window.onpopstate = () => {
        const params = new URLSearchParams(window.location.search);
        const file = params.get('file');
        const folder = params.get('folder');
        if (!file) { viewer.classList.remove('active'); document.body.style.overflow = 'auto'; }
        if (file) openMarkdown(file, false);
        else if (folder) renderCategoryFiles(folder, false, false);
        else renderRootFolders(false);
    };

    document.getElementById('search').oninput = (e) => {
        const k = e.target.value.toLowerCase();
        if(!k) { renderRootFolders(); return; }
        breadcrumb.style.display = 'block';
        breadcrumb.textContent = `🔍 검색 결과: "${k}"`;
        contentGrid.innerHTML = '';
        allData.filter(i => i.title.toLowerCase().includes(k) || i.category.toLowerCase().includes(k)).forEach(i => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="icon">📄</div><strong>${i.title}</strong><div style="font-size:0.75rem; color:var(--dim); margin-top:5px;">${i.category}</div>`;
            card.onclick = () => openMarkdown(i.path);
            contentGrid.appendChild(card);
        });
    };
</script>
</body>
</html>
