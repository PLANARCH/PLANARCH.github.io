<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>자료 아카이브</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js/lib/common.min.js"></script>

<!-- 🔥 Google Analytics
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script> -->
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-XXXXXXXXXX');
</script>

<style>
:root { --primary:#3b82f6; }

body.dark { --bg:#0f172a; --card:#1e293b; --text:#f8fafc; --dim:#94a3b8;}
body.light { --bg:#f8fafc; --card:#fff; --text:#0f172a; --dim:#64748b;}

body { margin:0; font-family:system-ui; background:var(--bg); color:var(--text); }

header {
  display:flex; justify-content:space-between;
  padding:10px 20px; border-bottom:1px solid var(--dim);
}

.layout { display:grid; grid-template-columns:auto 1fr auto; }

#sidebar { padding:1rem; border-right:1px solid var(--dim); }
#sidebar div { cursor:pointer; font-size:0.85rem; color:var(--dim); }

#toc { padding:1rem; border-left:1px solid var(--dim); }

.content { padding:1rem; }

#search {
  width:100%; padding:8px;
  border-radius:8px; border:none;
  background:var(--card); color:var(--text);
}
body.light #search { box-shadow:0 2px 6px rgba(0,0,0,0.1); }

.cards {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:0.8rem;
}

.card {
  height:100px;
  display:flex;
  justify-content:center;
  align-items:center;
  background:var(--card);
  border-radius:10px;
  cursor:pointer;
}

/* 🔥 태그 */
.tags { margin-top:5px; }
.tag {
  display:inline-block;
  font-size:0.7rem;
  padding:2px 6px;
  margin:2px;
  background:var(--primary);
  color:white;
  border-radius:6px;
  cursor:pointer;
}

/* 🔥 복사 버튼 */
.copy-btn {
  margin-bottom:10px;
  padding:5px 10px;
  background:var(--primary);
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.markdown-body { max-width:800px; margin:auto; }

.toc-item { cursor:pointer; font-size:0.8rem; color:var(--dim);}
</style>
</head>

<body class="dark">

<header>
  <h1>📚 자료 아카이브</h1>
  <div onclick="toggleTheme()">🌙</div>
</header>

<main class="layout">
  <aside id="sidebar"></aside>

  <section class="content">
    <input id="search" placeholder="검색..." />
    <div id="content-grid"></div>
    <div id="viewer"></div>
  </section>

  <aside id="toc"></aside>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
marked.setOptions({ breaks:true });

const grid = document.getElementById('content-grid');
const viewer = document.getElementById('viewer');
const sidebar = document.getElementById('sidebar');
const toc = document.getElementById('toc');
const searchInput = document.getElementById('search');

let allData = [];

// 🔥 태그 예시
// data.json에 추가하면 됨
// { title:"react", category:"frontend", path:"...", tags:["react","ui"] }

// LOAD
fetch('data.json')
.then(r=>r.json())
.then(data=>{
  allData = data;
  renderSidebar(data);
  render(data);
});

// 🔍 검색 + 태그
searchInput.addEventListener('input', e=>{
  const k = e.target.value.toLowerCase();
  render(allData.filter(i=>i.title.toLowerCase().includes(k)));
});

// SIDEBAR
function renderSidebar(data){
  sidebar.innerHTML='';
  const g = group(data);

  Object.keys(g).forEach(cat=>{
    const h=document.createElement('h3');
    h.textContent=cat;
    sidebar.appendChild(h);

    g[cat].forEach(i=>{
      const el=document.createElement('div');
      el.textContent=i.title;
      el.onclick=()=>openMarkdown(i.path);
      sidebar.appendChild(el);
    });
  });
}

// MAIN
function render(data){
  grid.innerHTML='';
  viewer.style.display='none';

  const g = group(data);

  Object.keys(g).forEach(cat=>{
    const section=document.createElement('div');
    section.innerHTML=`<h2>${cat}</h2>`;

    const cards=document.createElement('div');
    cards.className='cards';

    g[cat].forEach(i=>{
      const card=document.createElement('div');
      card.className='card';

      card.innerHTML = `
        <div>
          ${i.title}
          <div class="tags">
            ${(i.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}
          </div>
        </div>
      `;

      card.onclick=()=>openMarkdown(i.path);

      cards.appendChild(card);
    });

    section.appendChild(cards);
    grid.appendChild(section);
  });
}

// 🔗 복사
function copyLink() {
  navigator.clipboard.writeText(location.href);
  alert("링크 복사됨!");
}

// TOC
function generateTOC(){
  toc.innerHTML="<h3>목차</h3>";
  document.querySelectorAll('.markdown-body h1,h2,h3').forEach(el=>{
    const id = el.innerText.replace(/\s+/g,'-');
    el.id=id;

    const item=document.createElement('div');
    item.className='toc-item';
    item.textContent=el.innerText;
    item.onclick=()=>document.getElementById(id).scrollIntoView();

    toc.appendChild(item);
  });
}

// MARKDOWN
function openMarkdown(path){
  fetch(path)
  .then(r=>r.text())
  .then(md=>{
    const html = marked.parse(md);

    viewer.innerHTML = `
      <button onclick="copyLink()" class="copy-btn">🔗 링크 복사</button>
      <div class="markdown-body">${html}</div>
    `;

    grid.style.display='none';
    viewer.style.display='block';

    generateTOC();

    document.querySelectorAll('pre code').forEach(block=>{
      hljs.highlightElement(block);
    });

    history.pushState(null,"",`?file=${path}`);
  });
}

function group(data){
  const g={};
  data.forEach(i=>{
    if(!g[i.category]) g[i.category]=[];
    g[i.category].push(i);
  });
  return g;
}

function toggleTheme(){
  document.body.classList.toggle('dark');
  document.body.classList.toggle('light');
}
</script>

</body>
</html>
