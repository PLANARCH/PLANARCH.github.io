<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자료 아카이브</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js/styles/github-dark.min.css">
    
    <style>
        :root { 
            --primary: #3b82f6; 
            --sidebar-width: 260px;
        }

        body.dark { --bg:#0f172a; --card:#1e293b; --text:#f8fafc; --dim:#94a3b8; --border: #334155; }
        body.light { --bg:#f8fafc; --card:#fff; --text:#0f172a; --dim:#64748b; --border: #e2e8f0; }

        body { margin:0; font-family: 'Pretendard', system-ui, sans-serif; background:var(--bg); color:var(--text); transition: background 0.3s; overflow-x: hidden; }

        header {
            display:flex; justify-content:space-between; align-items: center;
            padding:10px 20px; border-bottom:1px solid var(--border);
            position: sticky; top: 0; background: var(--bg); z-index: 100;
        }

        .layout { display: flex; min-height: calc(100vh - 60px); position: relative; }

        /* 🔥 사이드바 스타일 (기본 숨김 로직) */
        #sidebar { 
            width: var(--sidebar-width); 
            border-right: 1px solid var(--border); 
            padding: 1rem;
            background: var(--bg);
            transition: all 0.3s ease;
            overflow-y: auto;
            /* 초기 상태: 왼쪽으로 완전히 밀어넣기 */
            margin-left: calc(var(--sidebar-width) * -1 - 2rem); 
            opacity: 0;
            visibility: hidden;
        }

        /* 사이드바가 보일 때 활성화되는 클래스 */
        #sidebar.active { 
            margin-left: 0;
            opacity: 1;
            visibility: visible;
        }

        .cat-group { margin-bottom: 15px; }
        .cat-title { 
            cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; 
            padding: 8px; border-radius: 6px; background: rgba(128,128,128,0.1); margin-bottom: 5px;
        }
        .cat-items { overflow: hidden; transition: max-height 0.3s ease; }
        .cat-items.collapsed { max-height: 0; }

        .sidebar-item { 
            padding: 6px 12px; cursor: pointer; font-size: 0.9rem; color: var(--dim); 
            border-radius: 4px; transition: 0.2s;
        }
        .sidebar-item:hover { color: var(--primary); background: rgba(59, 130, 246, 0.1); }

        .content { flex: 1; padding: 2rem; max-width: 1000px; margin: 0 auto; transition: margin 0.3s ease; }
        
        #search {
            width: 100%; padding: 12px; margin-bottom: 20px;
            border-radius: 10px; border: 1px solid var(--border);
            background: var(--card); color: var(--text); outline: none;
        }

        .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
        .card {
            padding: 20px; background: var(--card); border-radius: 12px; cursor: pointer;
            border: 1px solid var(--border); transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }

        #viewer { display: none; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; background: var(--primary); color: white; font-weight: bold; }
        .btn-secondary { background: var(--dim); }

        .markdown-body { padding: 20px; background: transparent !important; color: inherit !important; }
        body.dark .markdown-body { color: #e6edf3; }

        #toc { width: 200px; padding: 1rem; border-left: 1px solid var(--border); font-size: 0.85rem; }
        @media (max-width: 768px) { #toc { display: none; } }
    </style>
</head>

<body class="dark">

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div onclick="toggleSidebar()" style="cursor:pointer; font-size: 1.5rem; user-select: none;">☰</div>
        <h1 style="margin:0; font-size: 1.2rem;">📚 자료 아카이브</h1>
    </div>
    <div onclick="toggleTheme()" style="cursor:pointer; font-size: 1.2rem; user-select: none;">🌓</div>
</header>

<main class="layout">
    <aside id="sidebar"></aside>

    <section class="content">
        <div id="main-ui">
            <input id="search" placeholder="검색어를 입력하세요..." />
            <div id="content-grid"></div>
        </div>

        <div id="viewer">
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="closeMarkdown()">← 목록으로</button>
                <button class="btn" onclick="copyLink()">🔗 링크 복사</button>
            </div>
            <div id="md-content" class="markdown-body"></div>
        </div>
    </section>

    <aside id="toc"></aside>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js/lib/common.min.js"></script>

<script>
    // Marked 설정
    marked.setOptions({
        breaks: true,
        gfm: true,
        headerIds: true,
        highlight: function(code, lang) {
            const language = hljs.getLanguage(lang) ? lang : 'plaintext';
            return hljs.highlight(code, { language }).value;
        }
    });

    const sidebar = document.getElementById('sidebar');
    const grid = document.getElementById('content-grid');
    const mainUi = document.getElementById('main-ui');
    const viewer = document.getElementById('viewer');
    const mdContent = document.getElementById('md-content');
    const searchInput = document.getElementById('search');
    const toc = document.getElementById('toc');

    let allData = [];

    fetch('data.json')
    .then(r => r.json())
    .then(data => {
        allData = data;
        renderSidebar(data);
        renderGrid(data);
        
        const params = new URLSearchParams(window.location.search);
        if(params.has('file')) openMarkdown(params.get('file'));
    });

    function toggleSidebar() {
        // active 클래스를 넣었다 뺐다 하며 표시/숨김 제어
        sidebar.classList.toggle('active');
    }

    function renderSidebar(data) {
        sidebar.innerHTML = '';
        const grouped = groupByCategory(data);

        Object.keys(grouped).forEach(cat => {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'cat-group';

            const title = document.createElement('div');
            title.className = 'cat-title';
            title.innerHTML = `<span>${cat}</span><span>▾</span>`;
            
            const itemContainer = document.createElement('div');
            itemContainer.className = 'cat-items';

            title.onclick = (e) => {
                e.stopPropagation();
                itemContainer.classList.toggle('collapsed');
                title.querySelector('span:last-child').innerText = itemContainer.classList.contains('collapsed') ? '▸' : '▾';
            };

            grouped[cat].forEach(i => {
                const item = document.createElement('div');
                item.className = 'sidebar-item';
                item.textContent = i.title;
                item.onclick = (e) => {
                    e.stopPropagation();
                    openMarkdown(i.path);
                };
                itemContainer.appendChild(item);
            });

            groupDiv.appendChild(title);
            groupDiv.appendChild(itemContainer);
            sidebar.appendChild(groupDiv);
        });
    }

    function renderGrid(data) {
        grid.innerHTML = '';
        data.forEach(i => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div style="font-weight:bold; margin-bottom:10px;">${i.title}</div><div style="font-size:0.75rem; color:var(--dim)">${i.category}</div>`;
            card.onclick = () => openMarkdown(i.path);
            grid.appendChild(card);
        });
    }

    function openMarkdown(path) {
        fetch(path)
        .then(r => r.text())
        .then(md => {
            mainUi.style.display = 'none';
            viewer.style.display = 'block';
            mdContent.innerHTML = marked.parse(md);
            document.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
            generateTOC();
            history.pushState(null, "", `?file=${path}`);
            window.scrollTo(0,0);
            
            // 모바일 배려: 문서를 열면 사이드바를 자동으로 닫아줍니다.
            sidebar.classList.remove('active');
        });
    }

    function closeMarkdown() {
        mainUi.style.display = 'block';
        viewer.style.display = 'none';
        history.pushState(null, "", window.location.pathname);
    }

    function generateTOC() {
        toc.innerHTML = "<strong>목차</strong><hr>";
        mdContent.querySelectorAll('h1, h2, h3').forEach((h, idx) => {
            h.id = `header-${idx}`;
            const link = document.createElement('div');
            link.className = 'sidebar-item';
            link.style.fontSize = '0.8rem';
            link.textContent = h.textContent;
            link.onclick = () => h.scrollIntoView({ behavior: 'smooth' });
            toc.appendChild(link);
        });
    }

    function groupByCategory(data) {
        return data.reduce((acc, obj) => {
            const key = obj.category;
            if (!acc[key]) acc[key] = [];
            acc[key].push(obj);
            return acc;
        }, {});
    }

    function toggleTheme() {
        document.body.classList.toggle('dark');
        document.body.classList.toggle('light');
    }

    function copyLink() {
        navigator.clipboard.writeText(location.href);
        alert("링크가 복사되었습니다!");
    }

    searchInput.addEventListener('input', e => {
        const k = e.target.value.toLowerCase();
        renderGrid(allData.filter(i => i.title.toLowerCase().includes(k)));
    });
</script>

</body>
</html>
