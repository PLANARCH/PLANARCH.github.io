<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 웹 기술 트렌드 대시보드</title>
    <style>
        :root {
            --primary-color: #3b82f6;
            --accent-color: #8b5cf6;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-light: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 2rem 1rem;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.4);
            border-color: var(--primary-color);
        }

        .card h2 {
            color: var(--primary-color);
            margin-top: 0;
            font-size: 1.4rem;
        }

        .tag {
            display: inline-block;
            background-color: rgba(59, 130, 246, 0.2);
            color: var(--primary-color);
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .ai-badge {
            background-color: rgba(139, 92, 246, 0.2);
            color: var(--accent-color);
        }

        p {
            color: #cbd5e1;
            font-size: 0.95rem;
        }

        .loader {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--text-dim);
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.7; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-dim);
            font-size: 0.9rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 3rem;
        }
    </style>
</head>
<body>

<header>
    <h1>2026 웹 기술 트렌드</h1>
    <div class="subtitle">AI 통합 · 제로트러스트 · 모던 스택</div>
</header>

<main>
    <div class="grid-container" id="content-grid">
        <!-- Cards will be injected here by JS -->
        <div class="card" style="text-align: center;">
            <p><span class="loader"></span> 최신 데이터 로딩 중...</p>
        </div>
    </div>
</main>

<footer>
    Generated with 2026 Web Standards & AI-Assisted Design
</footer>

<script>
    // 2026 트렌드 데이터 (AI 검색 결과 기반 시뮬레이션)
    const trends = [
        {
            title: "AI 통합 개발 환경",
            tag: "AI Integration",
            desc: "단순 코딩을 넘어 AI 도구를 활용한 '바이브 코딩'이 표준입니다. 개발자는 AI와의 협업 능력을 키워야 합니다."
        },
        {
            title: "제로트러스트 보안",
            tag: "Security",
            desc: "경계 중심의 보안에서 벗어나, 모든 접근을 검증하는 제로트러스트 모델이 웹 애플리케이션의 핵심입니다."
        },
        {
            title: "Next.js & React 2026",
            tag: "Frontend Framework",
            desc: "Server Components와 동적 렌더링의 결합으로 성능과 SEO를 동시에 잡는 최신 프레임워크 전략이 필수적입니다."
        },
        {
            title: "모던 스택 선정 가이드",
            tag: "Strategy",
            desc: "React, Vue, Svelte 중 프로젝트의 규모와 요구사항에 따라 최적의 프레임워크를 선택하는 능력이 개발자의 역량을 좌우합니다."
        }
    ];

    // DOM 요소 로드 후 카드 렌더링
    document.addEventListener('DOMContentLoaded', () => {
        const grid = document.getElementById('content-grid');
        
        trends.forEach(trend => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <span class="tag">${trend.tag}</span>
                <h2>${trend.title}</h2>
                <p>${trend.desc}</p>
            `;
            grid.appendChild(card);
        });

        // 로딩 애니메이션 제거 (시뮬레이션)
        setTimeout(() => {
            const loader = document.querySelector('.loader');
            if(loader) loader.style.display = 'none';
        }, 1000);
    });
</script>

</body>
</html>
